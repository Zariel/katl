name: Public Kubernetes Bundles

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  plan:
    name: Plan Supported Bundles
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve supported release matrix
        id: plan
        run: |
          go run ./cmd/katl-kubernetes-release verify-recipe
          echo "matrix=$(go run ./cmd/katl-kubernetes-release matrix)" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify ${{ matrix.release.payloadVersion }}
    needs: plan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJSON(needs.plan.outputs.matrix).include }}
    env:
      ARTIFACT_VERSION: ${{ matrix.release.artifactVersion }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Resolve and verify bundle anonymously
        id: bundle
        shell: bash
        run: |
          image="ghcr.io/katl-dev/kubernetes:${ARTIFACT_VERSION}"
          verification="$(scripts/check-public-kubernetes-bundle "$image")"
          printf '%s\n' "$verification"
          digest="${verification##*@}"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "error: public bundle check returned invalid digest: $digest" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Authenticate provenance client to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Verify GitHub provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh attestation verify \
            "oci://ghcr.io/katl-dev/kubernetes@${{ steps.bundle.outputs.digest }}" \
            --repo katl-dev/katl \
            --signer-workflow katl-dev/katl/.github/workflows/kubernetes-bundles.yml \
            --source-ref refs/heads/main
