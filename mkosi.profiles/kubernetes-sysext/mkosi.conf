[Output]
Format=sysext
Output=katl-kubernetes
ImageId=katl-kubernetes
Overlay=yes

[Content]
Bootable=no
BaseTrees=../../_build/mkosi/katl-runtime-root
# Kubernetes packages come from the upstream pkgs.k8s.io stable RPM repository.
# The selected minor, repo URL, and expected package versions are declared in
# mkosi.profiles/kubernetes-sysext/kubernetes.env.
# The base runtime keeps systemd, networking, time sync, SSH, CA trust, disk and
# network tools, nftables, conntrack, iptables, ipset, ipvsadm, containerd, and
# the OCI runtime.
# Payload helper binaries: crictl, ethtool, and socat.
Packages=
        kubeadm-0:1.36.0-150500.1.1.x86_64
        kubelet-0:1.36.0-150500.1.1.x86_64
        kubectl-0:1.36.0-150500.1.1.x86_64
        cri-tools-0:1.36.0-150500.1.1.x86_64
        ethtool
        socat
