apiVersion: katl.dev/v1alpha1
kind: NodeConfigurationChange
metadata:
  sourceID: operator
  desiredVersion: "21"
apply:
  mode: live
spec:
  clusterDefaults:
    livePreflight:
      networkd: true
    networkd:
      files:
        - name: 20-vmtest-live.network
          content: |
            [Match]
            Name=*
            [Network]
            DHCP=yes
